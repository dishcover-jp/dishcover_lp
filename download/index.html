<!DOCTYPE html>
<html lang="ja"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dishcoverをダウンロード</title>
<meta name="robots" content="noindex">
<link rel="icon" href="../favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
<!-- ===== Meta Pixel : base code ===== -->
<script>
  !function(f,b,e,v,n,t,s)
  {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
  n.callMethod.apply(n,arguments):n.queue.push(arguments)};
  if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
  n.queue=[];t=b.createElement(e);t.async=!0;
  t.src=v;s=b.getElementsByTagName(e)[0];
  s.parentNode.insertBefore(t,s)}(window, document,'script',
  'https://connect.facebook.net/en_US/fbevents.js');
  fbq('init', '1683698942934009');   // ← index.html と同じピクセルIDに差し替え
  fbq('track', 'PageView');
</script>
<noscript><img height="1" width="1" style="display:none"
  src="https://www.facebook.com/tr?id=1683698942934009&ev=PageView&noscript=1"/></noscript>
<script>
  // Redirect mobile devices straight to their store. PC stays on this page (shows badges).
  (function(){
    var IOS_APP_URL = 'https://apps.apple.com/jp/app/id6761677783';
    var ANDROID_APP_URL = 'https://play.google.com/store/apps/details?id=jp.dishcover.app';
    var ua = navigator.userAgent || navigator.vendor || window.opera || '';
    var isIOS = /iPad|iPhone|iPod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    var isAndroid = /Android/.test(ua);
    var dest = isIOS ? IOS_APP_URL : isAndroid ? ANDROID_APP_URL : null;
    if (!dest) return;  // PC はリダイレクトせずバッジ表示のまま

    var platform = isIOS ? 'ios' : 'android';
    var go = function(){ window.location.replace(dest); };

    // Pixel 送信を挟んでから遷移。送信完了(eventID callback)か、最大 700ms で必ず遷移する
    if (window.fbq) {
      var jumped = false;
      var once = function(){ if (jumped) return; jumped = true; go(); };
      fbq('trackCustom', 'StoreClick', { platform: platform, source: 'download_auto' }, { eventID: 'auto_' + Date.now() });
      setTimeout(once, 700);   // 保険：計測が詰まっても 700ms で必ずストアへ
      // fbevents は送信をベストエフォートで行うため、ここでは時間ベースで確実に遷移させる
    } else {
      go();
    }
  })();
</script>
<style>
:root{color-scheme:light;--bg:radial-gradient(1100px 620px at 85% -6%, rgba(24,160,100,.12), transparent 62%), linear-gradient(180deg, #fcfdfa 0%, #f6faf3 45%, #eff7ef 100%);--text:#0f3527;--text2:rgba(15,53,39,.60);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);background-attachment:fixed;color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased;}
.card{max-width:440px;text-align:center;}
.logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:22px;margin-bottom:28px;letter-spacing:-.02em;}
h1{font-size:clamp(24px,5vw,30px);font-weight:700;letter-spacing:-.02em;margin-bottom:12px;}
p{font-size:15px;color:var(--text2);line-height:1.8;margin-bottom:30px;}
.badges{display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;}
.badge-link{display:inline-flex;line-height:0;}
.badge-link img{display:block;height:48px;width:auto;}
</style>
</head>
<body>
  <main class="card">
    <div class="logo">Dishcover</div>
    <h1>Dishcoverをダウンロード</h1>
    <p>お使いの端末に合わせて、アプリストアへ移動します。<br>移動しない場合は、下のボタンからお進みください。</p>
    <div class="badges" aria-label="アプリストアへのリンク">
      <a class="badge-link" href="https://apps.apple.com/jp/app/id6761677783" aria-label="App StoreでDishcoverをダウンロード"><img src="../assets/badge-appstore-trim.png" alt="App Storeからダウンロード" height="48"></a>
      <a class="badge-link" href="https://play.google.com/store/apps/details?id=jp.dishcover.app" aria-label="Google PlayでDishcoverをダウンロード"><img src="../assets/badge-googleplay-trim.png" alt="Google Playで手に入れよう" height="48"></a>
    </div>
  </main>
  <!-- ===== Store-badge click tracking (PC / non-redirect) ===== -->
  <script>
    document.addEventListener('click', function (e) {
      var a = e.target.closest('a.badge-link');
      if (!a) return;
      var href = a.getAttribute('href') || '';
      var platform = href.indexOf('apps.apple.com') > -1 ? 'ios'
                   : href.indexOf('play.google.com') > -1 ? 'android'
                   : 'other';
      if (window.fbq) {
        fbq('trackCustom', 'StoreClick', { platform: platform, source: 'download_badge' });
      }
    }, true);
  </script>
</body></html>
